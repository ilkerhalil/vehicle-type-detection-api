name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'uv'

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Run tests
      run: |
        uv run pytest tests/ -v --cov=vehicle_type_detection_api --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        cache: 'uv'

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Install development tools
      run: |
        uv tool install black isort flake8 mypy

    - name: Run flake8
      run: |
        uv run flake8 vehicle_type_detection_api/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run flake8 vehicle_type_detection_api/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run black
      run: |
        uv run black --check vehicle_type_detection_api/ tests/

    - name: Run isort
      run: |
        uv run isort --check-only vehicle_type_detection_api/ tests/

    - name: Run mypy
      run: |
        uv run mypy vehicle_type_detection_api/ --ignore-missing-imports