name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest vehicle_type_detection_api/tests/ -v --cov=vehicle_type_detection_api --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run flake8
        run: |
          flake8 vehicle_type_detection_api/ vehicle_type_detection_api/tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 vehicle_type_detection_api/ vehicle_type_detection_api/tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run black
        run: |
          black --check vehicle_type_detection_api/ vehicle_type_detection_api/tests/

      - name: Run isort
        run: |
          isort --check-only vehicle_type_detection_api/ vehicle_type_detection_api/tests/

      - name: Run mypy
        run: |
          mypy vehicle_type_detection_api/ --ignore-missing-imports
