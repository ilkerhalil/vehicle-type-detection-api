name: Pre-commit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "uv"

      - name: Install pre-commit
        run: |
          pip install uv
          uv sync --dev
          uv run pre-commit

      - name: Run pre-commit
        run: |
          uv run pre-commit run --all-files
